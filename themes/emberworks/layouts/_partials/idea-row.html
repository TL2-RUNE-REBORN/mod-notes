{{- $status := .Params.status | default "spark" -}}
<a class="post" href="{{ .RelPermalink }}">
  <span class="d">{{ .Date | time.Format "2006-01-02" }}</span>
  <span class="t"><span class="chip {{ $status }}">{{ i18n (printf "status_%s" $status) | default $status }}</span> {{ .Title }}
    {{ with .Params.summary | default (.Summary | plainify | truncate 64) }}
    <span class="x">{{ . }}</span>
    {{ end }}
  </span>
</a>
