{{- $n := . | default "diamond" -}}
{{- if eq $n "flame" -}}
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
  <path d="M12 3c-2 3-6 4.5-6 9a6 6 0 0 0 12 0c0-4.5-4-6-6-9Z" stroke-width="1.3"/>
  <circle cx="12" cy="14" r="2.4" stroke-width="1.2" opacity=".6"/>
</svg>
{{- else if eq $n "cube" -}}
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
  <path d="M12 2 4 7v10l8 5 8-5V7l-8-5Z" stroke-width="1.3"/>
  <path d="M12 2v20M4 7l8 5 8-5" stroke-width="1.3" opacity=".5"/>
</svg>
{{- else if eq $n "clock" -}}
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
  <circle cx="12" cy="12" r="8.5" stroke-width="1.3"/>
  <path d="M12 7v5l3.5 2.5" stroke-width="1.3" stroke-linecap="round"/>
</svg>
{{- else if eq $n "nodes" -}}
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
  <circle cx="6" cy="12" r="2.2" stroke-width="1.3"/>
  <circle cx="18" cy="6" r="2.2" stroke-width="1.3"/>
  <circle cx="18" cy="18" r="2.2" stroke-width="1.3"/>
  <path d="M8 11 16 7M8 13l8 4" stroke-width="1.2" opacity=".6"/>
</svg>
{{- else if eq $n "skull" -}}
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
  <path d="M12 3a7 7 0 0 0-7 7c0 2.4 1.2 4.4 3 5.5V19a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-3.5c1.8-1.1 3-3.1 3-5.5a7 7 0 0 0-7-7Z" stroke-width="1.3" stroke-linejoin="round"/>
  <circle cx="9.3" cy="10.6" r="1.5" stroke-width="1.2" opacity=".6"/>
  <circle cx="14.7" cy="10.6" r="1.5" stroke-width="1.2" opacity=".6"/>
  <path d="M12 13.4v2.4" stroke-width="1.2" opacity=".6" stroke-linecap="round"/>
</svg>
{{- else if eq $n "disk" -}}
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
  <rect x="4.5" y="4.5" width="15" height="15" rx="2" stroke-width="1.3"/>
  <path d="M8 4.5V9h8V4.5M8 19.5V14h8v5.5" stroke-width="1.2" opacity=".6"/>
</svg>
{{- else if eq $n "wrench" -}}
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
  <path d="M14.5 6.5a4 4 0 0 0-5.4 4.8L4 16.4V20h3.6l5.1-5.1a4 4 0 0 0 4.8-5.4L14.7 12l-2.7-2.7 2.5-2.8Z" stroke-width="1.3" stroke-linejoin="round"/>
</svg>
{{- else -}}
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
  <path d="M12 3 20 12l-8 9-8-9 8-9Z" stroke-width="1.3" stroke-linejoin="round"/>
  <path d="M12 3v18M4 12h16" stroke-width="1" opacity=".4"/>
</svg>
{{- end -}}
