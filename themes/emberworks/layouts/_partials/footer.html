<footer class="site">
  <span>{{ i18n "footerBrand" }} © {{ now.Year }}</span>
  <span>
    <b>MIKURO</b>
    {{ with site.Params.github }} · <a href="https://github.com/{{ . }}" rel="me">GITHUB</a>{{ end }}
    {{ if site.Params.rss }}{{ with site.Home.OutputFormats.Get "rss" }} · <a href="{{ .RelPermalink }}">RSS</a>{{ end }}{{ end }}
  </span>
</footer>
