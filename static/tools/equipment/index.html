/* ══════════ EMBERWORKS · 余烬工坊 design tokens(与主站一致) ══════════ */
:root{
  --bg:#100e0b; --bg-panel:#191410; --bg-panel2:#1f1813;
  --line:#2c241b; --line-hi:#453724;
  --text:#d9cdb6; --muted:#94856d; --faint:#675b48;
  --ember:#ff9a3c; --ember-hi:#ffc26b; --flame:#e0592e; --gold:#d8b26a;
  --r-magic:#6fa8ff; --r-rare:#ffd24a; --r-set:#7cc96e; --r-normal:#bdb4a4;
  --r-epic:#b48cff;   /* 史诗紫 · 本 MOD 特有品质档 */
  --serif:'Noto Serif SC','Palatino Linotype',Georgia,serif;
  --disp:'Cinzel','Noto Serif SC',serif;
  --ital:'Cormorant Garamond','Noto Serif SC',serif;
  --mono:'JetBrains Mono',Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--serif);font-size:17px;
  line-height:1.75;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(1100px 460px at 50% -8%, rgba(255,138,48,.10), transparent 60%),
             radial-gradient(700px 300px at 82% 4%, rgba(224,89,46,.05), transparent 65%)}
::selection{background:rgba(255,154,60,.25)}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 32px 60px}

/* ---------- 全站余烬火星 ---------- */
.ember-field{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ember-field b{position:absolute;bottom:-8px;width:4px;height:4px;border-radius:50%;
  background:var(--ember-hi);opacity:0;filter:blur(.4px);
  box-shadow:0 0 8px rgba(255,154,60,.65);
  animation:ember-rise var(--t,12s) linear var(--w,0s) infinite}
.ember-field b:nth-child(1){left:4%;--t:13s;--w:0s;--dx:26px}
.ember-field b:nth-child(2){left:11%;--t:17s;--w:5s;--dx:-18px;width:3px;height:3px}
.ember-field b:nth-child(3){left:18%;--t:11s;--w:2.5s;--dx:34px;width:2px;height:2px}
.ember-field b:nth-child(4){left:25%;--t:16s;--w:9s;--dx:-24px}
.ember-field b:nth-child(5){left:31%;--t:10s;--w:1.8s;--dx:16px;width:2px;height:2px}
.ember-field b:nth-child(6){left:38%;--t:14s;--w:6s;--dx:-28px;width:3px;height:3px}
.ember-field b:nth-child(7){left:45%;--t:12s;--w:4s;--dx:20px;width:3px;height:3px}
.ember-field b:nth-child(8){left:51%;--t:18s;--w:0.5s;--dx:-30px;width:2px;height:2px}
.ember-field b:nth-child(9){left:57%;--t:11s;--w:7.5s;--dx:24px}
.ember-field b:nth-child(10){left:63%;--t:15s;--w:3s;--dx:-16px;width:3px;height:3px}
.ember-field b:nth-child(11){left:69%;--t:10s;--w:5.5s;--dx:28px;width:2px;height:2px}
.ember-field b:nth-child(12){left:75%;--t:16s;--w:1.2s;--dx:-22px}
.ember-field b:nth-child(13){left:81%;--t:12s;--w:8s;--dx:18px;width:3px;height:3px}
.ember-field b:nth-child(14){left:87%;--t:14s;--w:2s;--dx:-26px;width:2px;height:2px}
.ember-field b:nth-child(15){left:93%;--t:13s;--w:6.8s;--dx:30px}
.ember-field b:nth-child(16){left:97%;--t:17s;--w:4.5s;--dx:-14px;width:2px;height:2px}
.ember-field b:nth-child(2n){background:var(--gold);box-shadow:0 0 8px rgba(216,178,106,.55)}
@keyframes ember-rise{0%{transform:translate3d(0,0,0);opacity:0}6%{opacity:.75}
  50%{opacity:.4}100%{transform:translate3d(var(--dx,20px),-78vh,0) scale(.55);opacity:0}}

/* ---------- 主站页头 / 页脚 ---------- */
.masthead{display:flex;align-items:baseline;justify-content:space-between;gap:20px;

nav.site{display:flex;gap:26px;flex-wrap:wrap}

/* ---------- 标题区 ---------- */

.toolbar select option{background:var(--bg-panel)}
.toolbar select optgroup{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;

.toolbar label.chk input{accent-color:var(--ember)}
.toolbar .stat{margin-left:auto;font-family:var(--mono);font-size:12px;

/* ---------- 表格 ---------- */

table{width:100%;border-collapse:collapse;min-width:980px}
thead th{font-family:var(--mono);font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;

.sheet-body{display:grid;grid-template-columns:1fr 1fr;gap:22px;padding:22px 24px 26px}
.kv{display:flex;justify-content:space-between;gap:14px;padding:5px 0;
  border-bottom:1px solid var(--line);font-size:15px}
.kv .k{font-family:var(--mono);font-size:12px;letter-spacing:.16em;color:var(--faint);
  text-transform:uppercase;padding-top:3px;white-space:nowrap}

.sec-h{font-family:var(--mono);font-size:11.5px;letter-spacing:.26em;text-transform:uppercase;

.fxline{font-size:15px;line-height:1.7;color:var(--gold)}
.afxname{font-family:var(--mono);font-size:12px;letter-spacing:.06em;color:var(--r-magic);

.afxline{font-size:15px;line-height:1.7;color:var(--r-magic);padding-left:14px}
.afxnone{font-size:13.5px;color:var(--faint);padding-left:14px}
.tgt{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.14em;
  color:var(--gold);border:1px solid rgba(216,178,106,.4);border-radius:3px;
  padding:1px 6px;margin-right:6px;vertical-align:1px}
.setname{color:var(--r-set);font-size:15.5px;font-weight:700}
.setmember{font-size:15px;cursor:pointer;padding-left:14px;line-height:1.7}
.setmember:hover{text-decoration:underline;text-decoration-color:rgba(255,154,60,.5)}
.setmember .meta{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-left:6px}
.setmember.cur{opacity:.5;cursor:default}
.setbonus-c{font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--r-set);

.setline{font-size:15px;line-height:1.7;color:var(--r-set);padding-left:14px}
.desc{margin-top:16px;font-family:var(--ital);font-style:italic;font-size:16px;
  line-height:1.7;color:var(--gold);opacity:.9}
.viewer{position:relative;background:#0b0906;border:1px solid var(--line);border-radius:4px;height:340px}
.viewer canvas{width:100%;height:100%;border-radius:4px;display:block}
.viewer .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;

@media (max-width:720px){

}
</style>

<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const DATA = window.EQUIP_DATA || [];
const SETS = window.EQUIP_SETS || {};
const P = '';          // 资源目录前缀 (release 版在子目录, 用 ../)
const RELEASE = true;        // release 版隐藏内部ID/路径/词缀内部名
const RARITY_ORDER = {NORMAL:0, MAGIC:1, SET:2, UNIQUE:3, EPIC:4, LEGENDARY:5, QUEST:6};

// ---- TL2 色码 |cAARRGGBB…|u → HTML; 字面 \n → 换行
function esc(s){return (s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function tlColor(s){
  return esc(s).replace(/\|c([0-9a-fA-F]{8})/g,(_,h)=>{
    const r=parseInt(h.slice(2,4),16),g=parseInt(h.slice(4,6),16),b=parseInt(h.slice(6,8),16);
    return Math.max(r,g,b)<70?'<span>':`<span style="color:#${h.slice(2)}">`;
  }).replace(/\|u/g,'</span>').replace(/\\n/g,'<br>');
}
function plain(s){return (s??'').replace(/\|c[0-9a-fA-F]{8}|\|u/g,'');}

// ---- 筛选控件
const rars=[...new Set(DATA.map(d=>d.rarity))].sort((a,b)=>(RARITY_ORDER[a]??9)-(RARITY_ORDER[b]??9));
const mods=[...new Set(DATA.map(d=>d.mod))].sort((a,b)=>a.localeCompare(b,'zh'));
fMod.innerHTML='<option value="">全部MOD</option>'+mods.map(m=>`<option>${m}</option>`).join('');
fRarity.innerHTML='<option value="">全部品质</option>'+rars.map(r=>{
  const cn=DATA.find(d=>d.rarity===r).rarityCn;return `<option value="${r}">${cn}</option>`;}).join('');
// 类型下拉: 按大类 optgroup 嵌套 (每组头部可整组筛选)
{
  const CAT_ORDER=['武器','护甲','饰品','镶嵌物','其他'];
  const byCat=new Map();
  DATA.forEach(d=>{
    if(!byCat.has(d.cat))byCat.set(d.cat,new Set());
    byCat.get(d.cat).add(d.slotCn);
  });
  let html='<option value="">全部类型</option>';
  CAT_ORDER.filter(c=>byCat.has(c)).forEach(c=>{
    const slots=[...byCat.get(c)].sort((a,b)=>a.localeCompare(b,'zh'));
    html+=`<optgroup label="${c}">`;
    if(slots.length>1)html+=`<option value="cat:${c}">全部${c}</option>`;
    html+=slots.map(s=>`<option value="${s}">${s}</option>`).join('');
    html+='</optgroup>';
  });
  fSlot.innerHTML=html;
}

let view=[], cursor=0; const CHUNK=150;
function reqText(d){
  const parts=[];
  if(d.reqs.lvl>0)parts.push(`等级 ${d.reqs.lvl}`);
  if(d.reqs.str>0)parts.push(`力量 ${d.reqs.str}`);
  if(d.reqs.dex>0)parts.push(`敏捷 ${d.reqs.dex}`);
  if(d.reqs.mag>0)parts.push(`专注 ${d.reqs.mag}`);
  if(d.reqs.def>0)parts.push(`体力 ${d.reqs.def}`);
  return parts.length?parts.join(' · '):'<span class="dim">无</span>';
}
function statText(d){
  if(d.isWeapon&&(d.dmg[0]||d.dmg[1]))return `伤害 ${d.dmg[0]}-${d.dmg[1]}`;
  if(d.armor)return `护甲 ${d.armor}`;
  return '<span class="dim">—</span>';
}
function rowHTML(d){
  const icon=d.icon?`<img src="${P}${d.icon}" loading="lazy" alt="">`
                   :'<div class="noicon"></div>';
  const btn=d.glb?`<button class="btn3d" data-id="${d.id}">预览</button>`
                 :'<span class="dim" style="font-family:var(--mono);font-size:11.5px">—</span>';
  return `<tr class="itemrow" data-id="${d.id}">
    <td class="icell">${icon}</td>
    <td><div class="iname rar-${d.rarity}">${tlColor(d.name)}</div>
        <div class="isub">${RELEASE?'':esc(d.intName)}${
          (d.fx&&d.fx.length?` <span class="b-fx">效果${d.fx.length}</span>`:'')+
          (d.afx&&d.afx.length?` <span class="b-afx">词缀${d.afx.length}</span>`:'')+
          (d.set?` <span class="b-set">套装</span>`:'')}</div></td>
    <td><span class="rar-${d.rarity}">${d.rarityCn}</span></td>
    <td class="tslot">${d.slotCn}</td>
    <td class="tmod">${esc(d.mod)}</td>
    <td class="tnum">${d.level||'—'}</td>
    <td class="treq">${reqText(d)}</td>
    <td class="tstat">${statText(d)}</td>
    <td style="text-align:center">${btn}</td></tr>`;
}
function renderMore(){
  if(cursor>=view.length)return;
  rows.insertAdjacentHTML('beforeend',view.slice(cursor,cursor+CHUNK).map(rowHTML).join(''));
  cursor+=CHUNK;
}
function apply(){
  const q=(document.getElementById('q').value||'').trim().toLowerCase();
  const fr=fRarity.value, fs=fSlot.value, fm=fMod.value, fg=fGlb.checked, sort=fSort.value;
  const slotOk=d=>!fs||(fs.startsWith('cat:')?d.cat===fs.slice(4):d.slotCn===fs);
  view=DATA.filter(d=>
    (!fr||d.rarity===fr)&&slotOk(d)&&(!fm||d.mod===fm)&&(!fg||d.glb)&&
    (!q||plain(d.name).toLowerCase().includes(q)||(d.intName||'').toLowerCase().includes(q)));
  view.sort((a,b)=>{
    if(sort==='level_desc')return b.level-a.level;
    if(sort==='level_asc')return a.level-b.level;
    if(sort==='rarity')return (RARITY_ORDER[b.rarity]??9)-(RARITY_ORDER[a.rarity]??9)||b.level-a.level;
    return plain(a.name).localeCompare(plain(b.name),'zh');
  });
  rows.innerHTML=''; cursor=0; renderMore();
  stat.textContent=`${view.length} / ${DATA.length}`;
  empty.style.display=view.length?'none':'block';
}
new IntersectionObserver(es=>es[0].isIntersecting&&renderMore()).observe(sentinel);
['q','fMod','fRarity','fSlot','fSort','fGlb'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener(el.tagName==='INPUT'&&el.type!=='checkbox'?'input':'change',apply);
});
apply();

// ---- three.js 查看器 (单例渲染器)
let renderer,scene,camera,controls,raf,gltfCache=new Map();
function initGL(){
  const canvas=document.getElementById('gl');
  renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(45,1,0.01,1000);
  controls=new OrbitControls(camera,canvas);
  controls.autoRotate=true; controls.autoRotateSpeed=2.5; controls.enableDamping=true;
  scene.add(new THREE.HemisphereLight(0xffe7cf,0x40352a,2.2));
  const d1=new THREE.DirectionalLight(0xffffff,2.0); d1.position.set(3,5,4); scene.add(d1);
  const d2=new THREE.DirectionalLight(0xffb070,0.7); d2.position.set(-4,-2,-3); scene.add(d2);
}
function resizeGL(){
  const c=renderer.domElement,w=c.clientWidth,h=c.clientHeight;
  if(c.width!==w||c.height!==h){renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
}
function animate(){
  raf=requestAnimationFrame(animate); resizeGL(); controls.update(); renderer.render(scene,camera);
}
let currentModel=null;
async function loadGlbBuffer(url){
  if(location.protocol==='file:')
    throw new Error('file:// 无法加载模型, 请运行: python extract_equipment.py --serve-only');
  const r=await fetch(P+url);
  if(!r.ok)throw new Error(r.status+' '+url);
  return await r.arrayBuffer();
}
async function showModel(url){
  if(!renderer)initGL();
  if(currentModel){scene.remove(currentModel);currentModel=null;}
  noModel.textContent='无 3D 模型';
  noModel.style.display=url?'none':'flex';
  loading.style.display=url?'flex':'none';
  cancelAnimationFrame(raf); animate();
  if(!url)return;
  try{
    let gltf=gltfCache.get(url);
    if(!gltf){
      const buf=await loadGlbBuffer(url);
      gltf=await new GLTFLoader().parseAsync(buf,'');
      gltfCache.set(url,gltf);
    }
    const model=gltf.scene.clone(true);
    model.traverse(o=>{
      if(o.isMesh){
        if(!o.geometry.attributes.normal)o.geometry.computeVertexNormals();
        o.material.side=THREE.DoubleSide;
      }});
    const box=new THREE.Box3().setFromObject(model);
    const size=box.getSize(new THREE.Vector3()),center=box.getCenter(new THREE.Vector3());
    model.position.sub(center);
    const r=Math.max(size.x,size.y,size.z)||1;
    camera.position.set(r*1.4,r*0.8,r*1.4); camera.near=r/100; camera.far=r*20;
    camera.updateProjectionMatrix();
    controls.target.set(0,0,0); controls.update();
    scene.add(model); currentModel=model;
  }catch(e){console.error(e);noModel.textContent=e.message||'模型加载失败';noModel.style.display='flex';}
  loading.style.display='none';
}
function openModal(d){
  mName.innerHTML=`<span class="rar-${d.rarity}">${tlColor(d.name)}</span>`;
  mSub.textContent=RELEASE?d.mod:`${d.intName} · ${d.mod} / ${d.file}`;
  if(d.icon){mIcon.src=P+d.icon;mIcon.style.display='block';}else mIcon.style.display='none';
  const rows=[];
  const add=(k,v)=>v&&rows.push(`<div class="kv"><span class="k">${k}</span><span class="v">${v}</span></div>`);
  add('品质',`<span class="rar-${d.rarity}">${d.rarityCn}</span>`);
  add('来源MOD',esc(d.mod));
  add('类型',`${d.slotCn}${d.slot&&d.slot!==d.slotCn?` <span class="dim" style="font-size:12.5px">(${esc(d.slot)})</span>`:''}`);
  add('物品等级',d.level||null);
  add('掉落等级区间',(d.minLevel||d.maxLevel)?`${d.minLevel} ~ ${d.maxLevel}`:null);
  add('装备要求',reqText(d));
  if(d.isWeapon&&(d.dmg[0]||d.dmg[1]))add('武器伤害',`${d.dmg[0]} - ${d.dmg[1]}`);
  add('攻速',d.speed||null);
  add('护甲',d.armor||null);
  add('最大孔数',d.sockets||null);
  if(d.fx&&d.fx.length){
    rows.push(`<div class="sec-h">自带效果</div>`);
    d.fx.forEach(l=>rows.push(`<div class="fxline">${tlColor(l)}</div>`));
  }
  if(d.afx&&d.afx.length){
    rows.push(`<div class="sec-h">固定词缀</div>`);
    d.afx.forEach(a=>{
      if(!a.n&&!a.fx.length&&!a.tgt)return;
      const head=[];
      if(a.tgt)head.push(`<span class="tgt">镶嵌到${a.tgt}</span>`);
      if(a.n)head.push(tlColor(a.n));
      if(head.length)rows.push(`<div class="afxname">${head.join('')}</div>`);
      a.fx.forEach(l=>rows.push(`<div class="afxline">${tlColor(l)}</div>`));
      if(head.length&&!a.fx.length)rows.push(`<div class="afxnone">(无数值效果)</div>`);
    });
  }
  if(d.set){
    const s=SETS[d.set];
    const members=DATA.filter(x=>x.set===d.set);
    rows.push(`<div class="sec-h">套装 · <span class="setname">${tlColor(s?s.name:d.set)}</span>
      <span style="text-transform:none;letter-spacing:.1em">(共${members.length}件)</span></div>`);
    members.forEach(m=>rows.push(
      `<div class="setmember${m.id===d.id?' cur':''}" data-id="${m.id}">`+
      `<span class="rar-${m.rarity}">${tlColor(m.name)}</span><span class="meta">${m.slotCn} · Lv${m.level||'?'}</span></div>`));
    if(s)s.bonuses.forEach(b=>{
      rows.push(`<div class="setbonus-c">${b.c} 件套装效果:</div>`);
      b.fx.forEach(l=>rows.push(`<div class="setline">${tlColor(l)}</div>`));
    });
  }
  if(d.desc)rows.push(`<div class="desc">${tlColor(d.desc)}</div>`);
  mStats.innerHTML=rows.join('');
  modal.classList.add('open');
  showModel(d.glb);
}
function closeModal(){
  modal.classList.remove('open');
  cancelAnimationFrame(raf);
  if(currentModel){scene.remove(currentModel);currentModel=null;}
}
mClose.onclick=closeModal;
mStats.addEventListener('click',e=>{
  const el=e.target.closest('.setmember');
  if(el&&!el.classList.contains('cur'))openModal(DATA[+el.dataset.id]);
});
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
rows.addEventListener('click',e=>{
  const tr=e.target.closest('tr.itemrow'); if(!tr)return;
  openModal(DATA[+tr.dataset.id]);
});
// #item=<id> 直达详情
const mh=location.hash.match(/#item=(\d+)/);
if(mh&&DATA[+mh[1]])openModal(DATA[+mh[1]]);
</script>
